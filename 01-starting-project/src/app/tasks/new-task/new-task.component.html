<!-- create modal to add task -->
<div class="modal" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <h2>Add Task</h2>
    <form (ngSubmit)="onSubmit()" #taskForm="ngForm">
      <label for="title">Title:</label>
      <input type="text" id="title" [(ngModel)]="enteredTitle" name="title" required />

      <label for="summary">Summary:</label>
      <textarea id="summary" [(ngModel)]="enteredSummary" name="summary"></textarea>

      <label for="dueDate">Due Date:</label>
      <input type="date" id="dueDate" [(ngModel)]="enteredDueDate" name="dueDate" />

      <button type="submit">Add Task</button>
      <button type="button" (click)="onCancel()">Cancel</button>
    </form>
  </div>
</div>
