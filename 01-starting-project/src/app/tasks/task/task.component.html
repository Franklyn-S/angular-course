<card>
  <article>
    <h2>{{ task().title }}</h2>
    <!-- BR format -->
    <!-- <time>{{ task().dueDate | date:'dd/MM/yyyy' }}</time> -->
    <time>{{ task().dueDate | date:'fullDate' }}</time>
    <p>{{ task().summary }}</p>
    <p class="actions">
      <button (click)="onCompleteTask()">Complete</button>
    </p>
  </article>
</card>
